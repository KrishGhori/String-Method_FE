<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow">

<h3 class="text-center">Palindrome Checker</h3>

<input type="text" id="text" class="form-control">

<button class="btn btn-primary mt-3" onclick="check()">Check</button>

<div id="result" class="mt-3"></div>

</div>
</div>

<script>

function check(){

let str=document.getElementById("text").value
let rev=str.split("").reverse().join("")

if(str===rev){
document.getElementById("result").innerHTML="Palindrome"
}
else{
document.getElementById("result").innerHTML="Not Palindrome"
}

}

</script>

</body>
</html>
