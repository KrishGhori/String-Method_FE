<!DOCTYPE html>
<html>
<head>
    <title>String Method Selector</title>
</head>
<body>

<h2>String Method Selector</h2>

<label>Enter String:</label>
<input type="text" id="inputString">

<br><br>

<label>Select Method:</label>
<select id="methodSelect">
    <option value="">--Select--</option>
    <option value="length">Length</option>
    <option value="uppercase">Uppercase</option>
    <option value="lowercase">Lowercase</option>
</select>

<br><br>

<button onclick="applyMethod()">Apply Method</button>

<p id="result"></p>

<script>
function applyMethod(){
    let str = document.getElementById("inputString").value;
    let method = document.getElementById("methodSelect").value;
    let output = "";

    if(method === "length"){
        output = str.length;
    }
    else if(method === "uppercase"){
        output = str.toUpperCase();
    }
    else if(method === "lowercase"){
        output = str.toLowerCase();
    }

    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
