<!DOCTYPE html>
<html>
<head>
<title>String Method Selector</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="card p-4 shadow">

<h3 class="text-center">String Method Selector</h3>

<label class="form-label">Enter String:</label>
<input type="text" id="inputString" class="form-control">

<br>

<label class="form-label">Select Method:</label>
<select id="methodSelect" class="form-select">
<option value="">--Select--</option>
<option value="length">Length</option>
<option value="uppercase">Uppercase</option>
<option value="lowercase">Lowercase</option>
</select>

<br>

<button class="btn btn-primary" onclick="applyMethod()">Apply</button>

<div class="alert alert-info mt-3" id="result"></div>

</div>
</div>

<script>
function applyMethod(){

let str=document.getElementById("inputString").value
let method=document.getElementById("methodSelect").value
let output=""

switch(method){

case "length":
output=str.length
break

case "uppercase":
output=str.toUpperCase()
break

case "lowercase":
output=str.toLowerCase()
break

case "substring":
output=str.substring(0,5)
break

case "replace":
output=str.replace("a","@")
break

case "trim":
output=str.trim()
break

}

document.getElementById("result").innerHTML="Result : "+output
}
</script>

</body>
</html>
