<!DOCTYPE html>
<html>
<head>
    <title>Advanced String Method Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center mb-4">String Method Selector</h3>

        <form>

            <div class="mb-3">
                <label class="form-label">Enter String:</label>
                <input type="text" id="inputString" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Select Method:</label>
                <select id="methodSelect" class="form-select" onchange="showExtraFields()">
                    <option value="">-- Select --</option>
                    <option value="length">Length</option>
                    <option value="substring">Substring</option>
                    <option value="uppercase">To Upper Case</option>
                    <option value="lowercase">To Lower Case</option>
                    <option value="replace">Replace</option>
                    <option value="trimstart">Trim Start</option>
                    <option value="trimend">Trim End</option>
                    <option value="at">At</option>
                    <option value="slice">Slice</option>
                    <option value="charcode">Char Code At</option>
                    <option value="padstart">Pad Start</option>
                    <option value="padend">Pad End</option>
                </select>
            </div>

           
            <div id="extraFields"></div>

            <button type="button" class="btn btn-primary mt-3" onclick="applyMethod()">
                Apply Method
            </button>
        </form>

        <hr>
        <div id="result" class="alert alert-info d-none"></div>

    </div>
</div>

</body>
</html>
