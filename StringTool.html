<!DOCTYPE html>
<html>
<head>

<title>String Tool</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h3 class="text-center">String Tool</h3>

<input type="text" id="inputString" class="form-control" placeholder="Enter text">

<p id="charCount">Characters: 0</p>

<select id="methodSelect" class="form-select mt-3">

<option value="">Select Method</option>
<option value="length">Length</option>
<option value="uppercase">Uppercase</option>
<option value="lowercase">Lowercase</option>
<option value="reverse">Reverse</option>

</select>

<button class="btn btn-primary mt-3" onclick="applyMethod()">Apply</button>

<div id="result" class="alert alert-info mt-3"></div>

</div>

</div>

<script>

document.getElementById("inputString").addEventListener("input",function(){
document.getElementById("charCount").innerHTML="Characters: "+this.value.length
})

function applyMethod(){

let str=document.getElementById("inputString").value
let method=document.getElementById("methodSelect").value
let output=""

if(method==="length"){
output=str.length
}

else if(method==="uppercase"){
output=str.toUpperCase()
}

else if(method==="lowercase"){
output=str.toLowerCase()
}

else if(method==="reverse"){
output=str.split("").reverse().join("")
}

document.getElementById("result").innerHTML=output

}

</script>

</body>
</html>
