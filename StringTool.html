<!DOCTYPE html>
<html>
<head>

<title>String Tool</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h3 class="text-center">String Tool</h3>

<input type="text" id="inputString" class="form-control" placeholder="Enter text">

<button class="btn btn-primary mt-3" onclick="showText()">Show</button>

<div id="result" class="alert alert-info mt-3"></div>

</div>

</div>

<script>

function showText(){

let str=document.getElementById("inputString").value

document.getElementById("result").innerHTML=str

}

</script>

</body>
</html>
